<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Freelance Collective - Agency Platform</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  
  :root {
    --bg-primary: #0a0e27;
    --bg-secondary: #10151f;
    --bg-card: #151b2b;
    --accent-primary: #8b5cf6;
    --accent-hover: #a78bfa;
    --accent-green: #00ff88;
    --accent-blue: #00d4ff;
    --text-primary: #ffffff;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border-color: #1e293b;
    --gradient-1: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
    --gradient-2: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
  }
  
  .header {
    background: rgba(21, 27, 43, 0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .logo-section {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .logo-icon {
    width: 48px;
    height: 48px;
    background: var(--gradient-1);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  
  .logo-title {
    font-size: 22px;
    font-weight: 800;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .logo-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  
  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid rgba(0, 255, 136, 0.2);
    border-radius: 20px;
  }
  
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse 2s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  
  .status-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-green);
  }
  
  .container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 40px;
  }
  
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    margin-bottom: 40px;
  }
  
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 28px;
    transition: all 0.3s;
  }
  
  .stat-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
  }
  
  .stat-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  
  .stat-value {
    font-size: 42px;
    font-weight: 800;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 8px 0;
  }
  
  .stat-change {
    font-size: 13px;
    color: var(--accent-green);
  }
  
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 32px;
  }
  
  .card-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
  }
  
  .service-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .service-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
  }
  
  .service-name {
    font-weight: 600;
  }
  
  .service-port {
    font-size: 12px;
    color: var(--text-muted);
    font-family: monospace;
  }
  
  .service-status {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  
  .service-status.online {
    background: rgba(0, 255, 136, 0.1);
    color: var(--accent-green);
  }
  
  .service-status.offline {
    background: rgba(255, 68, 68, 0.1);
    color: #ff4444;
  }
  
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo-section">
      <div class="logo-icon">👻</div>
      <div>
        <div class="logo-title">Phantom Freelance Collective</div>
        <div class="logo-subtitle">Agency Platform</div>
      </div>
    </div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-text">Checking Systems...</span>
    </div>
  </div>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Jobs Found</div>
        <div class="stat-value" id="stat-jobs">5</div>
        <div class="stat-change">Demo mode</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-label">Proposals Generated</div>
        <div class="stat-value" id="stat-proposals">0</div>
        <div class="stat-change">AI-powered</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-label">Active VAs</div>
        <div class="stat-value">0</div>
        <div class="stat-change">Ready to work</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value">$0</div>
        <div class="stat-change">Stripe connected</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚡ Service Status</div>
      <div class="service-list" id="services-list">
        <div class="loading">Checking services...</div>
      </div>
    </div>
  </div>

<script>
// Detect Codespaces environment and build proper URLs
const isCodespaces = window.location.hostname.includes('.app.github.dev');
const getServiceUrl = (port) => {
  if (isCodespaces) {
    // Extract the base Codespaces URL pattern
    const match = window.location.hostname.match(/([^-]+-[^-]+-[^-]+-[^-]+-[^.]+)/);
    if (match) {
      const baseUrl = match[1];
      return `https://${baseUrl}-${port}.app.github.dev`;
    }
  }
  return `http://localhost:${port}`;
};

const SERVICES = [
  { name: 'Job Acquisition', port: 6000, icon: '💼' },
  { name: 'Proposal Engine', port: 7000, icon: '✍️' },
  { name: 'Stripe Payments', port: 8000, icon: '💳' },
  { name: 'Email Automation', port: 9000, icon: '📧' },
  { name: 'Social Media', port: 10000, icon: '📱' },
  { name: 'Analytics', port: 11000, icon: '📊' },
];

async function checkServices() {
  const list = document.getElementById('services-list');
  list.innerHTML = '';
  let onlineCount = 0;
  
  for (const svc of SERVICES) {
    const item = document.createElement('div');
    item.className = 'service-item';
    
    try {
      const url = `${getServiceUrl(svc.port)}/health`;
      console.log(`Checking ${svc.name} at ${url}`);
      
      const controller = new AbortController();
      setTimeout(() => controller.abort(), 5000);
      
      const r = await fetch(url, { 
        signal: controller.signal,
        mode: 'cors'
      });
      const d = await r.json();
      onlineCount++;
      
      item.innerHTML = `
        <div>
          <div class="service-name">${svc.icon} ${svc.name}</div>
          <div class="service-port">Port ${svc.port}${d.mode ? ' · ' + d.mode.toUpperCase() : ''}</div>
        </div>
        <div class="service-status online">ONLINE</div>
      `;
    } catch (e) {
      console.error(`${svc.name} check failed:`, e.message);
      item.innerHTML = `
        <div>
          <div class="service-name">${svc.icon} ${svc.name}</div>
          <div class="service-port">Port ${svc.port}</div>
        </div>
        <div class="service-status offline">OFFLINE</div>
      `;
    }
    
    list.appendChild(item);
  }
  
  const statusText = document.querySelector('.status-text');
  statusText.textContent = onlineCount === SERVICES.length ? 
    'All Systems Operational' : 
    `${onlineCount}/${SERVICES.length} Services Online`;
}

console.log('🔥 Phantom Freelance Collective Platform');
console.log(`Environment: ${isCodespaces ? 'GitHub Codespaces' : 'Local'}`);
checkServices();
setInterval(checkServices, 30000);
</script>
</body>
</html>
